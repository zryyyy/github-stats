name: Generate Stats Images

on:
  push:
    branches: [ master ]
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@main
    - uses: mlugg/setup-zig@main

    - name: Build
      run: |
        zig build

    - name: Configure git
      run: |
        git config --global user.name "jstrieb/github-stats"
        git config --global user.email "github-stats[bot]@jstrieb.github.io"

    - name: Generate images
      run: |
        ./zig-out/bin/github-stats
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
        EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
        EXCLUDE_PRIVATE: "false"
        SILENT: "true"
        MAX_RETRIES: 5

    - name: Force push SVGs to orphan generated branch
      run: |
        mkdir -p /tmp/github-stats-output
        cp overview.svg languages.svg /tmp/github-stats-output/

        git switch --orphan generated-orphan

        git rm -rf . || true
        find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

        cp /tmp/github-stats-output/overview.svg .
        cp /tmp/github-stats-output/languages.svg .

        git add overview.svg languages.svg
        git commit -m "Update generated SVGs"

        git push --force origin generated-orphan:generated

  delete-workflow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 3
